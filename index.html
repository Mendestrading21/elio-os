<style>
:root{
  --bg:#0E0E11; --card:#18181B; --card2:#202024; --txt:#fff; --mut:#A1A1AA;
  --amber:#FF8A00; --amber2:#FF5E00; --violet:#7C3AED; --cyan:#38BDF8;
  --green:#22C55E; --warn:#F59E0B; --danger:#EF4444; --bd:rgba(255,255,255,.08);
  --acc:var(--amber); --acc2:var(--amber2); --grad:linear-gradient(135deg,var(--amber),var(--amber2));
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
[data-theme="violet"]{--acc:#7C3AED;--acc2:#38BDF8;--grad:linear-gradient(135deg,#38BDF8,#7C3AED 60%,#ff5cd0)}
[data-theme="mono"]{--bg:#000;--card:#0c0c0c;--card2:#141414;--acc:#fff;--acc2:#bbb;--grad:linear-gradient(135deg,#fff,#999)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
.app{display:flex;min-height:100vh}
/* SIDEBAR (desktop) */
.side{width:228px;flex-shrink:0;border-right:1px solid var(--bd);padding:18px 12px;position:sticky;top:0;height:100vh;overflow:auto;background:var(--card)}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.logo .mk{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:18px;box-shadow:0 0 18px rgba(255,138,0,.4)}
.logo b{font-size:15px;letter-spacing:.5px;font-weight:800;display:block}.logo small{font-size:9px;color:var(--mut);letter-spacing:2px}
.ngrp{font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin:16px 10px 6px}
.nl{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--mut);cursor:pointer;font-size:13.5px;font-weight:600;transition:.12s}
.nl:hover{color:var(--txt);background:var(--card2)}
.nl.on{color:var(--txt);background:var(--card2);box-shadow:inset 3px 0 0 var(--acc)}
.nl .ic{width:20px;text-align:center;font-size:15px}
/* MAIN */
.main{flex:1;min-width:0}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px 26px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(14,14,17,.86);backdrop-filter:blur(14px);z-index:20}
.top .dt{font-size:12px;color:var(--mut);letter-spacing:.5px}
.top .st{font-size:11px;font-weight:800;padding:5px 11px;border-radius:20px;border:1px solid var(--bd);color:var(--acc)}
.clk{font-size:18px;font-weight:800}
.content{padding:24px 26px 40px;max-width:1180px;margin:0 auto}
.page{display:none;animation:fade .25s}.page.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
h2.pt{font-size:22px;font-weight:800;margin-bottom:4px}.psub{color:var(--mut);font-size:13px;margin-bottom:18px}
.grid{display:grid;gap:15px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:18px;position:relative;overflow:hidden}
.card.soft{background:var(--card2)}
.card h3{font-size:10.5px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.kpi .v{font-size:30px;font-weight:800}.kpi .l{font-size:11px;color:var(--mut);margin-top:3px}
.kpi .tr{font-size:11px;font-weight:700;margin-top:6px}.up{color:var(--green)}.dn{color:var(--danger)}
.big{font-size:34px;font-weight:800;line-height:1}.sub{color:var(--mut);font-size:11.5px;margin-top:5px}.center{text-align:center}
.ring{display:grid;place-items:center;position:relative}.ring svg{transform:rotate(-90deg)}
.ring .lab{position:absolute;text-align:center}.ring .lab b{font-size:30px;font-weight:800}.ring .lab span{display:block;font-size:9px;color:var(--mut);letter-spacing:2px}
.gauge{margin-bottom:13px}.gauge .gt{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}.gauge .gt b{font-weight:700}
.bar{height:8px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:6px;background:var(--grad)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--bd);font-size:14px}.row:last-child{border:0}
.chk{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--bd);display:grid;place-items:center;font-size:15px;flex-shrink:0;cursor:pointer;background:rgba(255,255,255,.03);transition:.12s;color:#0E0E11}
.chk.done{background:var(--grad);border-color:transparent;box-shadow:0 0 12px rgba(255,138,0,.4)}
.input,select,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:11px;color:var(--txt);padding:12px;font-size:16px;font-family:inherit}
.input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
textarea{min-height:84px;resize:vertical}
label.fld{display:block;font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin:13px 0 6px}
.btn{background:var(--grad);color:#0E0E11;border:0;border-radius:12px;padding:13px 16px;font-weight:800;font-size:14px;cursor:pointer;width:100%}
.btn:active{transform:scale(.99)}.btn.ghost{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--bd)}
.btn.sm{padding:9px 13px;font-size:12px;width:auto;display:inline-block}
.cnt{display:flex;align-items:center;gap:12px}.cnt button{width:46px;height:46px;border-radius:12px;border:1px solid var(--bd);background:rgba(255,255,255,.04);color:var(--txt);font-size:22px;font-weight:700}.cnt b{font-size:26px;flex:1;text-align:center}
.coach{display:flex;gap:11px;align-items:flex-start;padding:13px;border-radius:14px;background:linear-gradient(135deg,rgba(255,138,0,.10),rgba(124,58,237,.08));border:1px solid var(--bd);margin-bottom:10px;font-size:13px;line-height:1.45}
.coach .e{font-size:18px}
.pill{display:inline-block;font-size:9px;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.07);color:var(--mut);font-weight:700;letter-spacing:.5px}
.spark{display:flex;align-items:flex-end;gap:4px;height:52px;margin-top:8px}.spark>i{flex:1;border-radius:3px 3px 0 0;background:var(--grad);min-height:3px}
.tl{display:flex;gap:0;margin-top:6px}.tl .s{flex:1;text-align:center;font-size:10px;color:var(--mut)}.tl .s .d{height:6px;border-radius:4px;background:var(--card2);margin:0 3px 6px;border:1px solid var(--bd)}.tl .s.now .d{background:var(--grad);border:0}
.mantra-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.mc{padding:18px;border-radius:16px;border:1px solid var(--bd);background:var(--card2);display:flex;flex-direction:column;gap:10px;min-height:120px;justify-content:space-between}
.mc .q{font-size:16px;font-weight:800;line-height:1.3}.mc .meta{display:flex;justify-content:space-between;align-items:center}
.mc .acts{display:flex;gap:6px}.mc .acts button{font-size:10px;padding:5px 8px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,.04);color:var(--mut);cursor:pointer}
.diag{display:flex;gap:8px;align-items:flex-end;height:120px;padding-top:8px}
.diag .col{flex:1;text-align:center;font-size:10px;color:var(--mut)}
.zones{display:grid;place-items:center;gap:0;position:relative;height:240px}
.zone{position:absolute;border-radius:50%;display:grid;align-items:start;justify-items:center;padding-top:8px;font-size:10px;font-weight:700;letter-spacing:.5px}
.daychip{display:inline-block;font-size:11px;padding:5px 11px;border-radius:20px;background:var(--card2);border:1px solid var(--bd);margin:0 6px 8px 0;color:var(--mut);cursor:pointer}.daychip.on{background:var(--grad);color:#0E0E11;font-weight:800;border-color:transparent}
.ev{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}.ev:last-child{border:0}.ev .h{font-weight:800;color:var(--acc);min-width:46px;font-size:13px}.ev b{font-size:13.5px;display:block}
.tt{font-size:11px;color:var(--mut);line-height:1.5;margin-top:8px}
table.pt-vs{width:100%;border-collapse:collapse;font-size:12.5px}table.pt-vs td{padding:9px;border-bottom:1px solid var(--bd);vertical-align:top}table.pt-vs td:first-child{color:var(--mut);width:46%}
/* mobile bottom nav */
.tabbar{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--grad);color:#0E0E11;padding:13px 22px;border-radius:12px;font-weight:800;opacity:0;pointer-events:none;transition:.3s;z-index:99}.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
@media(max-width:860px){
  .side{display:none}.top{padding:calc(var(--safe-t) + 12px) 16px 12px}.content{padding:18px 14px calc(96px + var(--safe-b))}
  .g2,.g3,.g4{grid-template-columns:1fr 1fr}
  .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;background:rgba(20,20,23,.94);backdrop-filter:blur(16px);border-top:1px solid var(--bd);justify-content:space-around;padding:8px 4px calc(8px + var(--safe-b));z-index:50}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut);font-size:9px;font-weight:700;border:0;background:none;padding:4px 0}.tab .i{font-size:20px}.tab.on{color:var(--txt)}.tab.on .i{filter:drop-shadow(0 0 7px var(--acc))}
}
@media(max-width:520px){.g3,.g4{grid-template-columns:1fr}}
</style>
</head>

<script>
/* ====== STATE ====== */
const KEY='ELIO_OS_PWA';
const S=JSON.parse(localStorage.getItem(KEY)||'{}');
['logs','priorities','scores','habits','plan','goals','gauges','domains','journal','settings','mantraDay'].forEach(k=>S[k]=S[k]||{});
if(!S.settings.theme)S.settings.theme='onyx';
if(!S.settings.name)S.settings.name='Elio';
const save=()=>localStorage.setItem(KEY,JSON.stringify(S));
const tk=(d=new Date())=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const $=id=>document.getElementById(id);
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
document.documentElement.dataset.theme=S.settings.theme;

/* ====== DATA ====== */
const WEIGHTS={Santé:20,Mental:15,'Couple/Famille':15,Travail:15,'Argent/Invest':15,Discipline:10,Plaisir:10};
const GAUGES=[['Santé','health'],['Discipline','discipline'],['Patrimoine','wealth'],['Famille','family'],['Business','business'],['Learning','learning'],['Lifestyle','lifestyle']];
const ANCHORS=[['eau','💧 Eau avant café + clopes comptées'],['mvt','🚶 Marche / mouvement'],['clope','🚬 Cigarettes suivies'],['joint','🌿 Pas de joint automatique'],['demain','🌙 Préparer demain']];
const HABITS=[['eau','💧 Eau avant le café'],['lena','👶 30 min Léna tél. loin'],['lit','😴 Au lit avant 23h'],['joint','🌿 Soir sans joint'],['velo','🚴 Vélo / sport'],['prio','🧠 3 priorités le matin'],['mel','❤️ 1 attention pour Mel'],['journal','📓 Journal du soir']];
const PLAN=['💧 Eau + clopes comptées','👶 30 min Léna tél. loin','😴 Au lit avant 23h','🌿 3 soirs sans joint','🚴 1 séance de vélo','✂️ RDV coiffeur/barbe','🩺 RDV médecin/dentiste','❤️ Resto avec Mel','🗣️ Dire à Mel ce que j\'admire','🏛️ Décider mes impôts','📝 Règle d\'investissement n°1','📰 Offre minimale WMB'];
const EVENTS=[['🧠 Routine matin + 3 priorités','06:40',[0,1,2,3,4,5,6]],['💧 Eau avant le café','06:45',[0,1,2,3,4,5,6]],['💪 Sport (séance)','07:00',[0,2,4]],['🥗 Marche midi','12:30',[0,1,2,3,4]],['❤️ Message à Mel','14:00',[0,1,2,3,4,5,6]],['💼 Fermeture mentale Skyline','18:00',[0,1,2,3,4]],['👶 30 min Léna tél. loin','18:30',[0,1,2,3,4,5,6]],['🌿 Soir SANS joint','20:45',[0,2,6]],['🚬 Noter mes cigarettes','21:00',[0,1,2,3,4,5,6]],['❤️ Date couple','20:30',[4]],['📰 Bloc WMB','21:00',[1,3]],['📵 Au lit','22:45',[0,1,2,3,4,5,6]],['⚖️ Pesée hebdo','08:00',[6]],['🔁 Revue + Score','18:30',[6]]];
const CALS=['🔱 Renaissance OS','👨‍👩‍👧 Famille & Léna','❤️ Couple & Mel','💼 Skyline','💪 Santé & Sport','🧠 Mental','💰 Argent','📈 Investissements','🏛️ Impôts','🏠 Immobilier','📰 WMB','🌍 Plaisir','🧘 Récup','✂️ Image','🤝 Réseau'];
const MANTRAS=[
['Petit à petit, mais tous les jours.','discipline'],['Discipline aujourd\'hui, liberté demain.','discipline'],['Le soir prépare l\'homme de demain.','soir'],['Zéro journée à zéro.','action'],['Pas parfait. Présent.','calme'],['Pour elles, je me lève.','famille'],['Ton calme vaut plus que ton chaos.','calme'],['Ce que tu répètes te construit.','discipline'],['Fais simple. Fais vrai. Fais-le.','action'],['Ton futur se joue dans tes soirs.','soir'],
['Une chose finie vaut mieux que dix commencées.','action'],['Je décide chaque cigarette.','addictions'],['Le weed ne décide pas mes soirées. Moi oui.','addictions'],['Mesurer, c\'est déjà reprendre le contrôle.','addictions'],['Dors. Le reste suivra.','santé'],['Mon corps est mon premier projet.','santé'],['Bouge 10 minutes. C\'est déjà gagné.','santé'],['La sécurité d\'abord, la liberté ensuite.','argent'],['On ne se refait jamais vite.','argent'],['Je me traite comme mon meilleur client.','argent'],
['Présent > parfait, surtout avec Léna.','famille'],['Mel mérite l\'homme que je peux être.','famille'],['Téléphone loin. Yeux dans les yeux.','famille'],['Le courage, c\'est agir fatigué.','courage'],['La peur est une boussole : j\'avance vers elle.','courage'],['Décroche le téléphone. Prends le RDV.','courage'],['Vendre, c\'est aider quelqu\'un à décider.','travail'],['Une action vaut mille analyses.','travail'],['Je finis avant de commencer autre chose.','travail'],['Mon ambition mérite ma discipline.','ambition'],
['Je construis l\'homme que Léna admirera.','ambition'],['La liberté se gagne en silence, jour après jour.','ambition'],['Respire. Tu n\'es pas en retard sur ta vie.','calme'],['Le chaos dehors, le calme dedans.','calme'],['Repose-toi sans culpabilité, c\'est stratégique.','calme'],['Cinq minutes maintenant battent une heure demain.','action'],['Commence avant d\'être prêt.','action'],['Le minimum tenu bat le maximum rêvé.','action'],['Je protège mes priorités comme ma famille.','discipline'],['Ce soir, je gagne mon matin.','soir'],
['Moins de plans. Plus de pas.','discipline'],['Je ne fuis plus. Je regarde, puis j\'agis.','courage'],['Chaque clope retardée est une victoire.','addictions'],['Mon poids descend quand mes soirs montent.','santé'],['L\'argent qui dort ne me rend pas libre.','argent'],['Sois l\'homme, pas l\'idée de l\'homme.','ambition'],['Aujourd\'hui compte. Demain est un mensonge confortable.','action'],['Je choisis l\'inconfort qui me construit.','courage'],['Fier le soir, pas coupable.','discipline'],['Renaissance : un jour, une case, une fois de plus.','discipline']];

/* ====== HELPERS ====== */
const log=()=>S.logs[tk()]||{};
function setLog(o){S.logs[tk()]=Object.assign(log(),o);save();}
function num(k){return +(log()[k]||0)}
function last7(){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(S.logs[tk(d)]||{})}return a;}
function sansJoint(){return last7().filter(l=>l.joint==='non').length}
function streak(){let s=0,d=new Date();for(let i=0;i<400;i++){const l=S.logs[tk(d)];const ok=l&&(((l.anchors||{}).eau)|| (S.habits[tk(d)]||{}).eau);if(ok){s++;d.setDate(d.getDate()-1)}else{if(i===0){d.setDate(d.getDate()-1);continue}break}}return s;}
function gauge(k){if(S.gauges[k]!=null)return S.gauges[k];return 50;}
function lifeScore(){let t=0;const map={Santé:'health',Mental:'discipline','Couple/Famille':'family',Travail:'business','Argent/Invest':'wealth',Discipline:'discipline',Plaisir:'lifestyle'};
  for(const d in WEIGHTS){t+=gauge(map[d])/100*WEIGHTS[d]}return Math.round(t);}
function dayScore(){const l=log();let s=0;
  if(+l.som>=6.5)s+=2;else if(+l.som>=5.5)s+=1;
  const an=Object.values(l.anchors||{}).filter(Boolean).length;s+=Math.round(an/5*3);
  const pr=(S.priorities[tk()]||[]).filter(x=>x&&x.done).length;s+=pr;
  if(l.joint==='non')s+=1;if(+l.cig<=(l.cigObj||99))s+=0;
  return Math.min(10,s);}

/* ====== COACH ENGINE ====== */
function nudges(){const l=log(),out=[];
  if(l.som&&+l.som<6)out.push(['😴','Sommeil court. Aujourd\'hui : <b>priorité récupération</b>. Ne cherche pas une journée parfaite.']);
  if(l.cig&&l.cigObj&&+l.cig>+l.cigObj)out.push(['🚬','Au-dessus de ton objectif clopes. <b>Aucun jugement.</b> Observe le déclencheur. Demain on retarde la première.']);
  if(l.joint==='oui'&&l.jointMode==='auto')out.push(['🌿','Le soir a pris le contrôle. Demain, <b>tu reprends une seule décision</b> : 1 soir sans.']);
  const pr=(S.priorities[tk()]||[]);if(pr.length&&pr.every(p=>p&&p.done))out.push(['🏆','Tes 3 priorités sont faites. <b>Journée gagnée.</b> Ne rajoute pas du chaos.']);
  const an=Object.values(l.anchors||{}).filter(Boolean).length;

  if(!out.length)out.push(['🔱','Tout est posé. <b>Une case, une fois de plus.</b> Petit à petit.']);
  return out;}

function domainPage(k){const c=DOMAINS[k],d=S.domains[k]||{};
  return `<h2 class="pt">${c.t}</h2><div class="psub">${c.sub}</div>
  <div class="card">${c.fields.map(f=>`<label class="fld">${f[1]}</label><input class="input" value="${esc(d[f[0]]||'')}" oninput="setDomain('${k}','${f[0]}',this.value)">`).join('')}
    <div class="tt" style="color:var(--txt);margin-top:14px">💡 ${c.tips}</div></div>`;}
function setDomain(k,f,v){S.domains[k]=S.domains[k]||{};S.domains[k][f]=v;save();}

/* ====== CALENDAR ====== */

  return `<h2 class="pt">📅 Calendrier & Rappels</h2><div class="psub">Importe le .ics → Apple Calendar te sonne tout seul.</div>
  <div class="card"><h3>📆 Mes 15 calendriers à créer</h3>${CALS.map(c=>`<span class="daychip">${c}</span>`).join('')}</div>
  <div class="card" style="margin-top:15px"><h3>🗓️ Programme de la semaine</h3>
    <div id="dayChips">${J.map((j,i)=>`<span class="daychip ${i===selDay?'on':''}" onclick="selDay=${i};go('calendar')">${j}</span>`).join('')}</div>
    <div>${EVENTS.filter(e=>e[2].includes(selDay)).sort((a,b)=>a[1]<b[1]?-1:1).map(e=>`<div class="ev"><div class="h mono">${e[1]}</div><div><b>${e[0]}</b></div></div>`).join('')}</div></div>

    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn sm" onclick="exportJSON()">📤 Exporter</button><button class="btn sm ghost" onclick="document.querySelector('#imp').click()">📥 Importer</button><button class="btn sm ghost" style="color:var(--danger)" onclick="if(confirm('Effacer TOUTES tes données locales ? (fais un export avant)')){localStorage.removeItem(KEY);location.reload()}">🗑️ Effacer</button></div>

/* ====== EXPORT FUNCTIONS ====== */
function dl(name,content,type){const b=new Blob([content],{type:type||'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),3000);}
function exportJSON(){dl('elio-os-backup-'+tk()+'.json',JSON.stringify(S,null,2),'application/json');toast('Backup JSON ✅');}
function importJSON(file){if(!file)return;const r=new FileReader();r.onload=e=>{try{const o=JSON.parse(e.target.result);localStorage.setItem(KEY,JSON.stringify(o));toast('Sauvegarde importée ✅');setTimeout(()=>location.reload(),700)}catch(x){toast('Fichier invalide')}};r.readAsText(file);}
function csvCell(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function exportCSV(kind){let rows=[];
  if(kind==='daily'){rows=[['date','cigarettes','cafes','cannabis','sommeil_h','poids','sport','humeur','energie','stress','victoire','declencheur','prochaine_action']];
    Object.keys(S.logs).sort().forEach(d=>{const l=S.logs[d];rows.push([d,l.cig||'',l.cafe||'',l.joint||'',l.som||'',l.poids||'',l.sport||'',l.hum||'',l.energie||'',l.stress||'',l.win||'',l.trig||'',l.next||''])});}
  else if(kind==='goals'){rows=[['domaine','jauge']];GAUGES.forEach(g=>rows.push([g[0],gauge(g[1])]));}
  else{rows=[['date','cigarettes','cafes','cannabis_mode','soir_sans_joint']];Object.keys(S.logs).sort().forEach(d=>{const l=S.logs[d];rows.push([d,l.cig||'',l.cafe||'',l.joint||'',l.joint==='non'?'oui':'non'])});}
  dl(kind+'.csv','﻿'+rows.map(r=>r.map(csvCell).join(',')).join('\n'),'text/csv');toast(kind+'.csv ✅');}
function exportMD(){let m='# 🔱 Dossier Renaissance — '+S.settings.name+'\n\n**Life Score : '+lifeScore()+'/100** · Série : '+streak()+' jours\n\n## Jauges\n';
  GAUGES.forEach(g=>m+='- '+g[0]+' : '+gauge(g[1])+'/100\n');
  m+='\n## Derniers jours\n';Object.keys(S.logs).sort().reverse().slice(0,14).forEach(d=>{const l=S.logs[d];m+='- **'+d+'** — 🚬'+(l.cig||0)+' ☕'+(l.cafe||0)+' 🌿'+(l.joint||'—')+' 😴'+(l.som||'—')+'h '+(l.hum||'')+(l.win?' · 🏆 '+l.win:'')+'\n'});
  dl('dossier-renaissance.md',m,'text/markdown');toast('Markdown ✅');}
function pad(n){return String(n).padStart(2,'0')}
function exportICS(){const BY=['MO','TU','WE','TH','FR','SA','SU'];let o=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Elio OS V100//FR','CALSCALE:GREGORIAN','X-WR-CALNAME:🔱 Renaissance OS'];
  EVENTS.forEach((e,i)=>{const r=new Date();let d=r;for(let k=0;k<7;k++){const x=new Date(r);x.setDate(r.getDate()+k);if(e[2].includes((x.getDay()+6)%7)){d=x;break}}const[h,mm]=e[1].split(':');
    o.push('BEGIN:VEVENT','UID:elio-'+i+'@os','DTSTART:'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(h)+pad(mm)+'00','DURATION:PT30M','RRULE:FREQ=WEEKLY;BYDAY='+e[2].map(x=>BY[x]).join(','),'SUMMARY:'+e[0],'BEGIN:VALARM','ACTION:DISPLAY','TRIGGER:-PT0M','DESCRIPTION:'+e[0],'END:VALARM','END:VEVENT')});
  o.push('END:VCALENDAR');dl('renaissance-elio.ics',o.join('\r\n'),'text/calendar');toast('Calendrier .ics ✅');}

/* ====== CLOCK / STATE / INIT ====== */
function dayState(){const an=Object.values(log().anchors||{}).filter(Boolean).length;const ls=lifeScore();
  if((+log().som||9)<6)return'🌙 RECOVERY';if(ls>=75)return'🚀 EXPANSION';if(an>=3)return'⚡ DISCIPLINE';return'🔄 RESET';}
function tick(){const d=new Date();$('clk').textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  $('dte').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});$('dayState').textContent=dayState();}
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
window._after=window._cd;
tick();setInterval(tick,15000);go('dash');
</script>
